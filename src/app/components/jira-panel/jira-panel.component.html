<div class="jira-panel">
  <div class="panel-header">
    <div class="panel-header-left">
      <span class="panel-title">{{ filterName() }}</span>
      <span class="panel-filter-id">({{ filterId }})</span>
    </div>
    @if (totalPages() > 1) {
      <span class="panel-page-indicator">Page {{ currentPage() + 1 }} / {{ totalPages() }}</span>
    }
  </div>
  <div class="panel-content">
    <div class="loading" [hidden]="!loading()">Loading...</div>
    <div class="error" [hidden]="!error()">{{ error() }}</div>
    <div class="empty" [hidden]="loading() || !!error() || issues().length > 0">
      No issues found.
    </div>
    @for (issue of pagedIssues(); track issue.key) {
      <app-jira-item
        [issue]="issue"
        [autoScrollPixelsPerSecond]="descriptionAutoScrollPixelsPerSecond"
        [showDescription]="showDescription"
      ></app-jira-item>
    }
  </div>
</div>
